    # Overrides for modules gggw's west.yml tracks on floating branches.
    # Pinned to their 2026-02-20 states; newer zmk-report-rate-limit
    # requires a ZMK API (zmk_endpoint_get_selected) newer than our zmk pin.
    - name: zmk-pmw3610-driver
      remote: efogdev
      revision: c9288fbd6c221c3829658a5cfa3f2283f079d1d4
    - name: zmk-report-rate-limit
      remote: efogdev
      revision: 1400f9f10f900b516fe578c0b52881f239be82b2
    - name: zmk-input-processor-xyz
      remote: badjeff
      revision: 0f0574f6a6c5b08fa964dff7b957ce67b2e0a9cf
  self:
